<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumo Robot 🤖</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        #start-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: opacity 0.5s;
        }

        #start-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.6);
            transition: transform 0.2s;
        }

        #start-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <!-- Start Overlay for Autoplay Policy -->
    <div id="start-overlay">
        <div class="robot-face" style="transform: scale(0.8); margin-bottom: 20px;">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth" style="height: 10px; border-radius: 10px;"></div>
        </div>
        <button id="start-btn" onclick="startApp()">👋 Bắt đầu trò chuyện</button>
    </div>

    <div class="container">
        <h1>Sumo Robot 🤖</h1>

        <div class="robot-face" id="robotFace">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth"></div>
        </div>

        <div class="status-box">
            <p id="status">Sẵn sàng trò chuyện!</p>
        </div>

        <div class="chat-box" id="chatBox">
            <!-- Chat history -->
        </div>

        <div class="input-group">
            <button id="micBtn" onclick="toggleMic()" title="Nói">🎤</button>
            <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off">
            <button class="send-btn" onclick="handleInput()" title="Gửi">➤</button>
        </div>
    </div>

    <script>
        const robotFace = document.getElementById('robotFace');
        const statusText = document.getElementById('status');
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const micBtn = document.getElementById('micBtn');

        // Setup Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'vi-VN';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                statusText.innerText = "Đang nghe bạn nói...";
                micBtn.classList.add('recording');
                robotFace.classList.add('surprised');
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.classList.remove('recording');
                robotFace.classList.remove('surprised');
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                sendMessage(text); // Auto send
            };

            recognition.onerror = (event) => {
                console.warn("Speech recognition error", event.error);
                isListening = false;
                micBtn.classList.remove('recording');
            }
        } else {
            micBtn.style.display = 'none';
        }

        function startApp() {
            const overlay = document.getElementById('start-overlay');
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                // Trigger welcome greeting (hidden from user chat)
                sendMessage("Xin chào Sumo, em hãy giới thiệu bản thân ngắn gọn với các bạn nhỏ nhé!", false);
            }, 500);
        }

        function toggleMic() {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                } catch (e) {
                    console.error(e);
                }
            }
        }

        function addMessage(sender, text) {
            const row = document.createElement('div');
            row.className = `message-row ${sender}`;

            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            bubble.innerText = text;

            row.appendChild(bubble);
            chatBox.appendChild(row);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function handleInput() {
            const text = userInput.value.trim();
            if (text) sendMessage(text);
        }

        async function sendMessage(textInput = null, showUserMessage = true) {
            const text = textInput || userInput.value.trim();
            if (!text) return;

            // UI Update
            if (showUserMessage) {
                addMessage('user', text);
                userInput.value = "";
            }

            userInput.disabled = true;
            statusText.innerText = "Sumo đang suy nghĩ...";

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                if (!response.ok) {
                    throw new Error("API Network response was not ok");
                }

                const data = await response.json();

                // Process Response
                addMessage('robot', data.response);
                setExpression(data.emojis);

                // Play Audio
                if (data.audio_chunks && data.audio_chunks.length > 0) {
                    playAudioQueue(data.audio_chunks);
                } else if (data.audio) { // Fallback
                    playAudio(data.audio);
                }

            } catch (error) {
                console.error("Error:", error);
                statusText.innerText = "Có lỗi xảy ra!";
                addMessage('robot', "Xin lỗi, Sumo đang gặp chút sự cố... 😵‍💫");
                setExpression("😵‍💫");
            } finally {
                userInput.disabled = false;
                statusText.innerText = "Sẵn sàng!";
                if (showUserMessage) userInput.focus();
            }
        }

        function playAudioQueue(chunks) {
            if (!chunks || chunks.length === 0) {
                robotFace.classList.remove('happy');
                setExpression("");
                return;
            }

            const currentChunk = chunks.shift(); // Get first chunk
            const audio = new Audio("data:audio/mp3;base64," + currentChunk);

            robotFace.classList.add('happy');
            audio.play().catch(e => console.log("Audio play failed:", e));

            audio.onended = () => {
                // Play next chunk
                playAudioQueue(chunks);
            };
        }

        function playAudio(base64Audio) {
            const audio = new Audio("data:audio/mp3;base64," + base64Audio);
            robotFace.classList.add('happy');
            audio.play().catch(e => console.log("Audio play failed:", e));

            audio.onended = () => {
                robotFace.classList.remove('happy');
                setExpression(""); // Reset
            };
        }

        function setExpression(exp) {
            robotFace.className = 'robot-face'; // Reset base class
            if (!exp) return;

            // Simple mapping
            if (['😀', '😃', '😄', '😁', '😆', '😊', '🥰', '😍'].some(e => exp.includes(e))) {
                robotFace.classList.add('happy');
            } else if (['😢', '😭', '😞', '😔', '☹️', '😿'].some(e => exp.includes(e))) {
                robotFace.classList.add('sad');
            } else if (['😠', '😡', '🤬', '💢'].some(e => exp.includes(e))) {
                robotFace.classList.add('angry');
            } else if (['😮', '😯', '😲', '🙀'].some(e => exp.includes(e))) {
                robotFace.classList.add('surprised');
            }
        }

        userInput.addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                handleInput();
            }
        });
    </script>
</body>

</html>
