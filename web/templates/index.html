<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumo Robot</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h1>Sumo Robot 🤖</h1>
        <div class="robot-face" id="robotFace">
            <div class="eye left"></div>
            <div class="eye right"></div>
            <div class="mouth"></div>
        </div>
        <div class="status-box">
            <p id="status">Sẵn sàng trò chuyện!</p>
        </div>
        <div class="chat-box" id="chatBox">
            <!-- Chat history -->
        </div>
        <div class="input-group">
            <button id="micBtn" onclick="toggleMic()" style="background-color: #4CAF50; width: 50px;">🎤</button>
            <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off">
            <button onclick="sendMessage()">Gửi</button>
        </div>
    </div>

    <script>
        const robotFace = document.getElementById('robotFace');
        const statusText = document.getElementById('status');
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const micBtn = document.getElementById('micBtn');

        // Setup Speech Recognition (Browser Built-in)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isListening = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'vi-VN';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                statusText.innerText = "Đang nghe...";
                micBtn.style.backgroundColor = "#ff4444"; // Red when recording
                robotFace.classList.add('surprised'); // Open mouth listening
            };

            recognition.onend = () => {
                isListening = false;
                micBtn.style.backgroundColor = "#4CAF50";
                robotFace.classList.remove('surprised');
            };

            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                userInput.value = text;
                sendMessage(); // Auto send when silence detected
            };
        } else {
            micBtn.style.display = 'none'; // Hide if not supported
            alert("Trình duyệt của bạn không hỗ trợ nhận diện giọng nói.");
        }

        function toggleMic() {
            if (!recognition) return;
            if (isListening) {
                recognition.stop();
            } else {
                recognition.start();
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // UI Update
            addMessage('user', text);
            userInput.value = "";
            userInput.disabled = true;
            statusText.innerText = "Sumo đang suy nghĩ...";

            try {
                // Call API
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();

                // Process Response
                addMessage('robot', data.response);
                setExpression(data.emojis);

                // Play Audio
                if (data.audio) {
                    playAudio(data.audio);
                }

            } catch (error) {
                console.error("Error:", error);
                statusText.innerText = "Có lỗi xảy ra!";
            } finally {
                userInput.disabled = false;
                statusText.innerText = "Sẵn sàng!";
            }
        }

        function playAudio(base64Audio) {
            const audio = new Audio("data:audio/mp3;base64," + base64Audio);
            // Move mouth while playing
            robotFace.classList.add('happy');
            audio.play();
            audio.onended = () => {
                robotFace.classList.remove('happy');
                setExpression(""); // Reset
            };
        }

        userInput.addEventListener("keypress", function (event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        function addMessage(sender, text) {
            const p = document.createElement('p');
            p.className = sender;
            p.innerText = (sender === 'user' ? 'Bạn: ' : 'Sumo: ') + text;
            chatBox.appendChild(p);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setExpression(exp) {
            robotFace.className = 'robot-face'; // Reset
            if (!exp) return;

            if (['😀', '😃', '😄', '😁', '😆', '😊', '🥰', '😍'].some(e => exp.includes(e))) {
                robotFace.classList.add('happy');
            } else if (['😢', '😭', '😞', '😔', '☹️'].some(e => exp.includes(e))) {
                robotFace.classList.add('sad');
            } else if (['😠', '😡', '🤬', '💢'].some(e => exp.includes(e))) {
                robotFace.classList.add('angry');
            } else if (['😮', '😯', '😲', '🙀'].some(e => exp.includes(e))) {
                robotFace.classList.add('surprised');
            }
        }
    </script>
</body>

</html>
