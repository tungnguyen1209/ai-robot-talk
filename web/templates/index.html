<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumo - Robot của bé</title>
    <style>
        body { background: #ffebf1; font-family: 'Arial Rounded MT Bold', sans-serif; text-align: center; padding: 20px; color: #ff5e9c; }
        #sumo-container { background: white; padding: 40px; border-radius: 40px; box-shadow: 0 10px 30px rgba(255,100,150,0.2); max-width: 500px; margin: 0 auto; border: 4px solid #ff5e9c; }
        #avatar { font-size: 80px; margin-bottom: 20px; transition: 0.3s; }
        .speaking { animation: bounce 0.5s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        button { background: #ff5e9c; color: white; border: none; padding: 15px 30px; font-size: 20px; border-radius: 50px; cursor: pointer; margin: 10px; transition: 0.2s; box-shadow: 0 5px #d83d7a; }
        button:active { transform: translateY(5px); box-shadow: 0 0; }
        #response-box { font-size: 24px; margin: 30px 0; min-height: 80px; line-height: 1.5; }
        input { padding: 10px; border-radius: 20px; border: 2px solid #ffb3d1; width: 70%; margin-bottom: 10px; font-size: 18px; outline: none; }
    </style>
</head>
<body>
    <div id="sumo-container">
        <div id="avatar">🤖</div>
        <h1>Sumo - Bạn thân của bé</h1>
        <div id="response-box">Nhấn nút Micro và nói "Chào Sumo" đi nào!</div>
        
        <form id="ask-form">
            <input type="text" id="user-input" placeholder="Bé muốn nói gì với Sumo?" />
            <br>
            <button type="submit" id="send-btn">Gửi lời nhắn</button>
            <button type="button" id="mic-btn">🎙️ Micro (Nói ngay)</button>
        </form>
    </div>

    <script>
        const avatar = document.getElementById('avatar');
        const responseBox = document.getElementById('response-box');
        const askForm = document.getElementById('ask-form');
        const userInput = document.getElementById('user-input');

        // Hàm xử lý gửi tin nhắn
        async function sendMessage(text) {
            responseBox.innerText = "Sumo đang suy nghĩ... 🤔";
            avatar.innerText = "🤔";
            
            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await res.json();
                
                // Hiển thị câu trả lời
                responseBox.innerText = data.response;
                avatar.innerText = "🤖";
                avatar.classList.add('speaking');
                
                // Phát âm thanh
                if (data.audio) {
                    const audio = new Audio("data:audio/mp3;base64," + data.audio);
                    audio.play();
                    audio.onended = () => avatar.classList.remove('speaking');
                }
            } catch (err) {
                responseBox.innerText = "Ôi, Sumo bị đau họng rồi!";
            }
        }

        askForm.onsubmit = (e) => {
            e.preventDefault();
            const text = userInput.value;
            if (text) {
                sendMessage(text);
                userInput.value = "";
            }
        };

        // Nhận diện giọng nói cơ bản (Web Speech API)
        const micBtn = document.getElementById('mic-btn');
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'vi-VN';

        micBtn.onclick = () => {
            recognition.start();
            micBtn.innerText = "Sumo đang nghe... 👂";
        };

        recognition.onresult = (event) => {
            const speechToText = event.results[0][0].transcript;
            userInput.value = speechToText;
            sendMessage(speechToText);
            micBtn.innerText = "🎙️ Micro (Nói ngay)";
        };
    </script>
</body>
</html>
